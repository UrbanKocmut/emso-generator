<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>EMŠO generator</title>
    <meta content="Ustvarite naključne slovenske EMŠO številke glede na prilagodljive parametre, kot so datum rojstva, spol in drugo."
          name="description">
    <meta content="EMŠO generator, Slovenija, naključni EMŠO, slovenski ID generator, orodje" name="keywords">
    <meta content="urban" name="author">
    <meta content="sl" name="language">
    <meta content="Generator slovenskih EMŠO številk" property="og:title">
    <meta content="Ustvarite naključne slovenske EMŠO številke z lahkoto in prilagodite parametre."
          property="og:description">
    <meta content="xnb8tqKhnWDbmJ-ZcreKmNNeJEPkIzC79o-slaLRFmk" name="google-site-verification"/>
</head>

<style>
    @font-face {
        font-family: 'IBM Plex Sans';
        src: url('./fonts/IBMPlexSans-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'IBM Plex Sans';
        src: url('./fonts/IBMPlexSans-Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'IBM Plex Mono';
        src: url('./fonts/IBMPlexMono-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
    }

    /* General Styles */
    body {
        font-family: 'IBM Plex Sans', sans-serif;
        background-color: #fff;
        color: #000;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        overflow-x: hidden;
    }

    /* Header */
    header,
    main {
        width: 100%;
        max-width: 600px;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        color: #000;
    }

    /* Form Layout */
    form {
        width: 100%;
        display: flex;
        flex-direction: column;
    }

    p {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        width: 100%;
    }

    /* Input Labels & Inputs Alignment */
    label {
        flex: 0 0 50%; /* Make labels a fixed width for alignment */
        text-align: left;
        font-weight: bold;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"],
    button {
        flex: 1; /* Inputs take remaining space */
        font-size: 1rem;
        padding: 10px;
        border: 1px solid #000;
        background-color: #fff;
        color: #000;
        outline: none;
        box-sizing: border-box;
    }


    /* Button Styling */
    button {
        background-color: #000;
        color: #fff;
        border: 1px solid #000;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    button:hover {
        background-color: #fff;
        color: #000;
    }

    /* Output Box */
    #emso-output {
        width: 125px;
        white-space: pre;
        font-family: 'IBM Plex Mono', monospace;
        overflow-x: auto;
        padding: 20px;
        background-color: #f4f4f4;
        border: 1px solid #000;
        content-visibility: auto;
        contain-intrinsic-size: 0 500px;
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        p {
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            flex: unset;
            width: 100%;
            margin-bottom: 5px;
        }

        body {
            align-items: start;
        }

        h1 {
            margin-top: unset;
        }

    }

    .loading {
        display: none;
        margin-left: 10px;
        font-size: 0.9rem;
    }

    .loading.visible {
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid #000;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }


</style>

<body>
<header>
    <h1>Generator slovenskih EMŠO številk</h1>
</header>

<main>
    <h2>Izberite parametre</h2>

    <form id="parameters-form">
        <p>
            <label for="date-of-birth-input">Datum rojstva</label>
            <input id="date-of-birth-input" type="date">
        </p>

        <p>
            <label for="18-plus-input">
                Polnoletna oseba (18+) <input id="18-plus-input" type="checkbox">
            </label>
            <label for="gender-input">
                Moški <input id="gender-input" type="checkbox">
            </label>
        </p>

        <p>
            <label for="number-generated-input">Število generiranih EMŠO številk</label>
            <input id="number-generated-input" min="1" required step="1" type="number" value="10">
        </p>

        <p>
            <button id="refresh-btn" type="button">Generiraj</button>
            <span class="loading" id="loading-indicator">
        <span class="spinner"></span>
        <span id="loading-text">Generiram EMŠO datoteko...</span>
    </span>
        </p>

    </form>

    <h2 id="emso-output-title">Generirane EMŠO številke</h2>
    <pre class="output-box" id="emso-output">
        <!-- EMŠO rezultati bodo prikazani tukaj -->
    </pre>
</main>


<script>
    const VIEW_THRESHOLD = 100000;      // show in page up to 100k
    const MAX_COUNT = 100000000;        // hard cap 100M

    // compute once at startup
    const EMSO_START_TS = new Date(1976, 0, 1).getTime(); // 1976-01-01

    // "today"
    const EMSO_TODAY = new Date();
    const EMSO_END_TS_ALL = EMSO_TODAY.getTime();

    // today minus 18 years
    const EMSO_18_TODAY = new Date(
        EMSO_TODAY.getFullYear() - 18,
        EMSO_TODAY.getMonth(),
        EMSO_TODAY.getDate()
    );
    const EMSO_END_TS_18PLUS = EMSO_18_TODAY.getTime();
    const EMSO_TEMP_DATE = new Date();


    function generateEMSO(dateOfBirth, is18Plus, isMale) {

        if (isNaN(dateOfBirth)) {
            dateOfBirth = getRandomEMSOBirthday(is18Plus);
        }

        // Extract day, month, and year from the date object
        let day = dateOfBirth.getDate();
        let month = dateOfBirth.getMonth() + 1; // Months are 0-based
        let year = dateOfBirth.getFullYear();

        // Format date part (DDMMYYY)
        const formattedDate = `${String(day).padStart(2, "0")}${String(month).padStart(2, "0")}${String(year).slice(-3)}`;

        // Region code (Slovenian citizens: 50–59)
        const regionCode = 50 + Math.floor(Math.random() * 10); // 50–59

        // Gender-specific sequence
        const sequenceStart = isMale ? 500 : 0; // true for male, false for female

        let sequence = Math.floor(Math.random() * 500) + sequenceStart;

        // Combine the first 12 digits
        let partialEMSO = `${formattedDate}${regionCode}${String(sequence).padStart(3, "0")}`;

        // Calculate control digit
        let controlDigit = calculateControlDigit(partialEMSO);
        while (controlDigit >= 10) {
            sequence += 1;
            partialEMSO = `${formattedDate}${regionCode}${String(sequence).padStart(3, "0")}`;
            controlDigit = calculateControlDigit(partialEMSO);
        }

        return `${partialEMSO}${controlDigit}`;
    }

    // Function to calculate the control digit for EMŠO
    function calculateControlDigit(partialEMSO) {
        const weights = [7, 6, 5, 4, 3, 2, 7, 6, 5, 4, 3, 2];
        const sum = partialEMSO.split("").reduce((acc, digit, index) => {
            return acc + Number(digit) * weights[index];
        }, 0);

        const remainder = sum % 11;
        return remainder === 0 ? 0 : 11 - remainder;
    }

    function getRandomEMSOBirthday(is18Plus = false) {
        const startTimestamp = EMSO_START_TS;
        const endTimestamp = is18Plus ? EMSO_END_TS_18PLUS : EMSO_END_TS_ALL;

        const randomTimestamp =
            Math.floor(Math.random() * (endTimestamp - startTimestamp + 1)) +
            startTimestamp;

        // reuse same Date instance
        EMSO_TEMP_DATE.setTime(randomTimestamp);
        return EMSO_TEMP_DATE;
    }

    function updateEmsos(numberGeneratedInput, isMaleInput, is18PlusInput, dateInput, emsoOutput) {
        let numberToGenerate = numberGeneratedInput.value;
        let isMale = isMaleInput.checked;
        let is18Plus = is18PlusInput.checked;
        let dateOfBirth = new Date(dateInput.value);

        if (isNaN(numberToGenerate) || numberToGenerate === undefined) {
            numberToGenerate = 10;
        }

        if (isNaN(isMale)) {
            isMale = false;
        }

        if (isNaN(is18Plus)) {
            is18Plus = false;
        }

        let emsos = new Array(numberToGenerate);

        for (let i = 0; i < numberToGenerate; i++) {
            emsos[i] = generateEMSO(dateOfBirth, is18Plus, isMale);
        }
        emsoOutput.textContent = emsos.join("\n");
    }

    window.onload = function () {

        const dateInput = window.document.getElementById("date-of-birth-input");
        const is18PlusInput = window.document.getElementById("18-plus-input");
        const isMaleInput = window.document.getElementById("gender-input");
        const numberGeneratedInput = window.document.getElementById("number-generated-input");
        const refreshBtn = window.document.getElementById("refresh-btn");
        const emsoOutput = window.document.getElementById("emso-output");
        const emsoOutputTitle = window.document.getElementById("emso-output-title");
        const form = window.document.getElementById("parameters-form");

        const dobRow = dateInput.parentElement;

        const loadingIndicator = document.getElementById("loading-indicator");
        const loadingText = document.getElementById("loading-text");

        let isGenerating = false;

        function setGenerating(generating, isDownloadMode) {
            isGenerating = generating;

            if (loadingIndicator) {
                loadingIndicator.classList.toggle("visible", generating);
            }

            if (generating) {
                dateInput.disabled = true;
                is18PlusInput.disabled = true;
                isMaleInput.disabled = true;
                numberGeneratedInput.disabled = true;
                refreshBtn.disabled = true;
            } else {
                is18PlusInput.disabled = false;
                isMaleInput.disabled = false;
                numberGeneratedInput.disabled = false;
                refreshBtn.disabled = false;
                // keep date disabled if 18+ is checked
                dateInput.disabled = is18PlusInput.checked;
            }

            if (isDownloadMode) {
                refreshBtn.textContent = generating ? "Generiram datoteko..." : "Prenesi EMŠO datoteko";
            } else {
                refreshBtn.textContent = "Generiraj";
            }

            if (!generating && loadingText) {
                loadingText.textContent = "Generiram EMŠO datoteko...";
            }
        }

        async function generateAndDownloadLargeEmso(count, isMale, is18Plus, dateInputValue) {
            const CHUNK_SIZE = 100000; // 100k per chunk
            const chunks = [];

            const hasFixedDate = !!dateInputValue;
            let fixedDate = null;
            if (hasFixedDate) {
                const d = new Date(dateInputValue);
                if (!isNaN(d)) {
                    fixedDate = d;
                }
            }

            let generated = 0;

            while (generated < count) {
                const currentChunkSize = Math.min(CHUNK_SIZE, count - generated);
                const lines = new Array(currentChunkSize);

                for (let i = 0; i < currentChunkSize; i++) {
                    const dob = fixedDate || getRandomEMSOBirthday(is18Plus);
                    lines[i] = generateEMSO(dob, is18Plus, isMale);
                }

                chunks.push(lines.join("\n") + "\n");
                generated += currentChunkSize;

                if (loadingText) {
                    const percent = Math.floor((generated / count) * 100);
                    loadingText.textContent = `Generiram EMŠO datoteko... ${percent}%`;
                }

                // yield to keep UI responsive
                await new Promise(requestAnimationFrame);
            }

            const blob = new Blob(chunks, {type: "text/plain;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `emso_${count}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();

            setTimeout(() => URL.revokeObjectURL(url), 60000);
        }

        async function handleGenerate() {
            if (isGenerating) return;

            let count = parseInt(numberGeneratedInput.value, 10);
            if (!Number.isFinite(count) || count <= 0) {
                count = 10;
                numberGeneratedInput.value = "10";
            }
            if (count > MAX_COUNT) {
                count = MAX_COUNT;
                numberGeneratedInput.value = String(MAX_COUNT);
            }

            const isMale = isMaleInput.checked;
            const is18Plus = is18PlusInput.checked;
            const isDownloadMode = count > VIEW_THRESHOLD;

            if (!isDownloadMode) {
                emsoOutput.style.display = "";
                emsoOutputTitle.style.display = "";
                setGenerating(true, false);
                try {
                    updateEmsos(numberGeneratedInput, isMaleInput, is18PlusInput, dateInput, emsoOutput);
                } finally {
                    setGenerating(false, false);
                }
            } else {
                emsoOutputTitle.style.display = "none";
                setGenerating(true, true);
                try {
                    await generateAndDownloadLargeEmso(count, isMale, is18Plus, dateInput.value);
                } finally {
                    setGenerating(false, true);
                }
            }
        }

        function updateUiModeAndPreview() {
            if (isGenerating) return;

            let n = parseInt(numberGeneratedInput.value, 10);
            if (!Number.isFinite(n) || n <= 0) return;

            if (n > MAX_COUNT) {
                n = MAX_COUNT;
                numberGeneratedInput.value = String(MAX_COUNT);
            }

            const isDownloadMode = n > VIEW_THRESHOLD;

            if (isDownloadMode) {
                emsoOutput.style.display = "none";
                emsoOutputTitle.style.display = "none";
                refreshBtn.textContent = "Prenesi EMŠO datoteko";
                // do NOT auto-generate for big counts
            } else {
                emsoOutput.style.display = "";
                emsoOutputTitle.style.display = "";
                refreshBtn.textContent = "Generiraj";
                // small enough → update preview live
                updateEmsos(numberGeneratedInput, isMaleInput, is18PlusInput, dateInput, emsoOutput);
            }
        }

        form.addEventListener("submit", function (ev) {
            ev.preventDefault(); // stop reload on Enter
            handleGenerate();
        });

        dateInput.addEventListener("input", ev => {
            updateUiModeAndPreview();
        });

        is18PlusInput.addEventListener("input", ev => {
            if (is18PlusInput.checked) {
                dateInput.value = "";
                dateInput.disabled = true;
                dobRow.style.display = "none";
            } else {
                dateInput.disabled = false;
                dobRow.style.display = "";
            }

            updateUiModeAndPreview();
        });

        isMaleInput.addEventListener("input", ev => {
            updateUiModeAndPreview();
        });

        numberGeneratedInput.addEventListener("input", ev => {
            updateUiModeAndPreview();
        });

        refreshBtn.addEventListener("click", ev => {
            handleGenerate();
        });

        // Initial preview
        updateEmsos(numberGeneratedInput, isMaleInput, is18PlusInput, dateInput, emsoOutput);
    };


</script>

</body>

</html>
